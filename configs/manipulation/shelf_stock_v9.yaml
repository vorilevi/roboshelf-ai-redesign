# Shelf Stocking Manipulációs Policy — v9 konfiguráció
# Phase 030 F3 — gripper actuator (2026-04-25)
#
# Változások v8-hoz képest:
#   - action_dim: 4 → 5 (5. DOF = gripper nyit/zár)
#   - XML: 7 finger position actuator (ctrl[4..10])
#   - ent_coef: 0.03 (v8=0.05 túl magas volt, v7=0.01 túl alacsony)
#   - w_lift: 3.0 marad
#   - w_grasp: 2.0 marad

scene:
  xml_path: src/envs/assets/scene_manip_sandbox_v2.xml
  robot_pos: [0.0, 0.0, 0.793]
  stock_body: stock_1
  target_site: target_shelf
  right_hand_site: right_hand_site

env:
  max_episode_steps: 500
  goal_radius: 0.08
  grasp_dist_threshold: 0.10
  lift_height: 0.10
  lift_trigger_threshold: 0.03
  obs_dim: 24
  action_dim: 5    # 4 kar + 1 gripper

reward:
  w_reach:       1.0
  w_grasp:       2.0
  w_lift:        3.0
  w_place:       2.0
  w_placed:     10.0
  w_joint_limit: -0.5
  w_smooth:      -0.001
  tanh_scale_reach: 5.0
  tanh_scale_place: 5.0
  lift_trigger_threshold: 0.03

ppo:
  n_envs: 8
  n_steps: 2048
  batch_size: 512
  n_epochs: 10
  learning_rate: 3.0e-4
  lr_schedule: linear
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.03    # v7=0.01 (collapse), v8=0.05 (túl random) → 0.03
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 5_000_000
  net_arch:
    pi: [256, 256, 128]
    vf: [256, 256, 128]

eval:
  n_eval_episodes: 10
  eval_freq: 50_000
  deterministic: true

checkpoint:
  save_freq: 500_000
  save_path: results/manip_checkpoints_v9/

logging:
  tensorboard_log: data/logs/manip_shelf_stock_v9/
  verbose: 1

vec_normalize:
  enabled: true
  norm_obs: true
  norm_reward: true
  clip_obs: 10.0

acceptance:
  min_success_rate: 0.7
  phase_reach_min: 0.85
  phase_grasp_min: 0.75
