# Shelf Stocking Manipulációs Policy — v8 konfiguráció
# Phase 030 F3 — policy collapse fix (2026-04-25)
#
# Változások v7-hez képest:
#   - ent_coef: 0.01 → 0.05 (policy collapse ellen — fő fix)
#   - w_lift: 1.0 → 3.0 (erősebb lift signal, elvész a grasp zajában)
#   - w_grasp: 2.0 → marad (grasp már 8/10-szer megy, ne szögezzük oda)
#   - lift_trigger_threshold: 0.03m — csak valódi emelkedés aktiválja a lift reward-ot
#   - checkpoint save_path: results/manip_checkpoints_v8/

scene:
  xml_path: src/envs/assets/scene_manip_sandbox_v2.xml
  robot_pos: [0.0, 0.0, 0.793]
  stock_body: stock_1
  target_site: target_shelf
  right_hand_site: right_hand_site

env:
  max_episode_steps: 500
  goal_radius: 0.08
  grasp_dist_threshold: 0.10
  lift_height: 0.10
  lift_trigger_threshold: 0.03   # ÚJ: csak ennyi emelkedés felett számít lift reward
  obs_dim: 24
  action_dim: 4

reward:
  # v8: lift signal erősítve, ent_coef növelve a policy collapse ellen
  w_reach:       1.0   # marad
  w_grasp:       2.0   # marad (grasp már működik, ne erősítsük tovább)
  w_lift:        3.0   # 1.0 → 3.0 (fő változás)
  w_place:       2.0   # marad
  w_placed:     10.0   # marad
  w_joint_limit: -0.5
  w_smooth:      -0.001
  tanh_scale_reach: 5.0
  tanh_scale_place: 5.0
  lift_trigger_threshold: 0.03   # küszöb alatt 0 lift reward (nem csak rezgés)

ppo:
  n_envs: 8
  n_steps: 2048
  batch_size: 512
  n_epochs: 10
  learning_rate: 3.0e-4
  lr_schedule: linear
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05    # 0.01 → 0.05 (policy collapse ellen — legkritikusabb változás)
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 5_000_000
  net_arch:
    pi: [256, 256, 128]
    vf: [256, 256, 128]

eval:
  n_eval_episodes: 10
  eval_freq: 50_000
  deterministic: true

checkpoint:
  save_freq: 500_000
  save_path: results/manip_checkpoints_v8/

logging:
  tensorboard_log: data/logs/manip_shelf_stock_v8/
  verbose: 1

vec_normalize:
  enabled: true
  norm_obs: true
  norm_reward: true
  clip_obs: 10.0

acceptance:
  min_success_rate: 0.7
  phase_reach_min: 0.85
  phase_grasp_min: 0.75
