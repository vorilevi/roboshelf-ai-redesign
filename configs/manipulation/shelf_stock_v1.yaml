# Shelf Stocking Manipulációs Policy — v1 konfiguráció
# Fázis C: rögzített testű sandbox, csak jobb kar (14 DoF)
#
# Architektúra:
#   ManipPolicy (PPO) → position target[14] → jobb kar PD control
#   Lábak és bal kar: rögzített (0 torque)
#
# Feladat:
#   Asztalon lévő piros doboz → 2. polcszintre (z≈0.467)
#   4 fázis: Reach → Grasp → Lift → Place
#
# Aktuátorok (14 DoF, nu=14):
#   0-3:  váll (pitch, roll, yaw) + könyök
#   4-6:  csukló (roll, pitch, yaw)
#   7-9:  hüvelykujj (0,1,2)
#   10-11: mutatóujj (0,1)
#   12-13: középső ujj (0,1)

scene:
  xml_path: src/envs/assets/scene_manip_sandbox.xml
  # robot pozíció a scene-ben: x=0, y=2.2, z=0.793 (rögzített)
  robot_pos: [0.0, 2.2, 0.793]
  stock_body: stock_1
  target_site: target_shelf
  right_hand_site: right_hand_site

env:
  max_episode_steps: 500
  # Sikeres elhelyezés: termék target_shelf-től ≤ goal_radius
  goal_radius: 0.08           # m — kissé tágabb mint a nav-nál
  # Fázis thresholdok
  grasp_dist_threshold: 0.06  # m — kéz-termék távolság alatt: "megfogta"
  lift_height: 0.15           # m — ennyit kell emelni megfogás után
  # Obs dim: hand_xyz(3) + stock_xyz(3) + target_xyz(3) + joint_pos(14) + joint_vel(14) + grasp_flag(1) = 38
  obs_dim: 38
  # Action dim: 14 DoF pozíció target (normalizált [-1,1])
  action_dim: 14

reward:
  # Fázis 1 — Reach: kéz közelítsen a termékhez
  w_reach:       2.0    # távolság csökkentés kéz→termék
  # Fázis 2 — Grasp: termék mozdul a kézzel
  w_grasp:      20.0    # bónusz ha a termék emelkedik
  # Fázis 3 — Lift: termék z-magassága nő
  w_lift:        5.0    # magasság-növekedés jutalma
  # Fázis 4 — Place: termék közelítsen a targethez
  w_place:      10.0    # távolság csökkentés termék→target
  w_placed:    100.0    # célba érés bónusz
  # Büntetések
  w_joint_limit: -1.0   # ízületi limit közelítés büntetése
  w_smooth:      -0.01  # akció változás büntetése (simaság)
  w_time:        -0.005 # időbüntetés

ppo:
  n_envs: 8
  n_steps: 2048
  batch_size: 512           # n_steps * n_envs / 32
  n_epochs: 10
  learning_rate: 3.0e-4
  lr_schedule: linear
  gamma: 0.99               # nav-nál 0.999, manip-nál rövidebb horizon
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 5_000_000
  # Nagyobb háló — manipuláció komplexebb mint navigáció
  net_arch:
    pi: [256, 256, 128]
    vf: [256, 256, 128]

eval:
  n_eval_episodes: 10
  eval_freq: 50_000
  deterministic: true

checkpoint:
  save_freq: 100_000
  save_path: roboshelf-results/manip/shelf_stock_v1/

logging:
  tensorboard_log: data/logs/manip_shelf_stock_v1/
  verbose: 1

vec_normalize:
  enabled: true
  norm_obs: true
  norm_reward: true
  clip_obs: 10.0

acceptance:
  # Fázis C elfogadási feltétel
  min_success_rate: 0.7     # 70%+ sikeres elhelyezés
  phase_reach_min: 0.85     # 85%+ reach fázis teljesítés
  phase_grasp_min: 0.75     # 75%+ grasp fázis teljesítés
