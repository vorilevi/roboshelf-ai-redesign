# Shelf Stocking Manipulációs Policy — v1 konfiguráció
# Fázis C: rögzített testű sandbox, csak jobb kar (14 DoF)
#
# Architektúra:
#   ManipPolicy (PPO) → position target[14] → jobb kar PD control
#   Lábak és bal kar: rögzített (0 torque)
#
# Feladat:
#   Asztalon lévő piros doboz → 2. polcszintre (z≈0.467)
#   4 fázis: Reach → Grasp → Lift → Place
#
# Aktuátorok (14 DoF, nu=14):
#   0-3:  váll (pitch, roll, yaw) + könyök
#   4-6:  csukló (roll, pitch, yaw)
#   7-9:  hüvelykujj (0,1,2)
#   10-11: mutatóujj (0,1)
#   12-13: középső ujj (0,1)

scene:
  # v2: generált scene, eredeti G1 kinematikával (helyes body quat értékek)
  xml_path: src/envs/assets/scene_manip_sandbox_v2.xml
  # robot pelvis: world pos="0 0 0.793", robot +x irányba néz
  # storage asztal: x=1.2 (robot előtt), gondola_A: x=-0.5 (robot mögött)
  robot_pos: [0.0, 0.0, 0.793]
  stock_body: stock_1
  target_site: target_shelf
  right_hand_site: right_hand_site

env:
  max_episode_steps: 500
  # Sikeres elhelyezés: termék target_shelf-től ≤ goal_radius
  goal_radius: 0.08           # m — kissé tágabb mint a nav-nál
  # Fázis thresholdok
  grasp_dist_threshold: 0.06  # m — kéz-termék távolság alatt: "megfogta"
  lift_height: 0.15           # m — ennyit kell emelni megfogás után
  # Obs dim: hand_xyz(3) + stock_xyz(3) + target_xyz(3) + joint_pos(4) + joint_vel(4) + grasp_flag(1) = 18
  # Csukló + ujjak rögzítve (equality constraint), csak váll×3 + könyök aktív
  obs_dim: 18
  # Action dim: 4 DoF (right_shoulder_pitch/roll/yaw + right_elbow)
  action_dim: 4

reward:
  # Dense distance alapú reward (nem delta!):
  #   r_reach = -w_reach * hand_dist  → kényszeríti a kart közelíteni
  #   r_place = -w_place * stock_dist → kényszeríti a terméket a targethez
  #
  # Fázis 1 — Reach: -w_reach * kéz→termék távolság
  w_reach:       1.0    # hand_dist ~1.6m → r_reach ~ -1.6/lépés; elfogadható skála
  # Fázis 2 — Grasp: termék emelkedési bónusz
  w_grasp:      20.0
  # Fázis 3 — Lift: magasság növekedés
  w_lift:        5.0
  # Fázis 4 — Place: -w_place * termék→target távolság
  w_place:       2.0
  w_placed:    100.0    # célba érés bónusz
  # Büntetések — minimálisak, ne versenyezzenek a reach-hel
  w_joint_limit: -0.5
  w_smooth:      -0.001 # nagyon alacsony: ne blokkolja a mozgást
  w_time:         0.0   # időbüntetés kikapcsolva (ne büntessük a lassú közelítést)

ppo:
  n_envs: 8
  n_steps: 2048
  batch_size: 512           # n_steps * n_envs / 32
  n_epochs: 10
  learning_rate: 3.0e-4
  lr_schedule: linear
  gamma: 0.99               # nav-nál 0.999, manip-nál rövidebb horizon
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 10_000_000
  # Nagyobb háló — manipuláció komplexebb mint navigáció
  net_arch:
    pi: [256, 256, 128]
    vf: [256, 256, 128]

eval:
  n_eval_episodes: 10
  eval_freq: 50_000
  deterministic: true

checkpoint:
  save_freq: 100_000
  save_path: roboshelf-results/manip/shelf_stock_v1/

logging:
  tensorboard_log: data/logs/manip_shelf_stock_v1/
  verbose: 1

vec_normalize:
  enabled: true
  norm_obs: true
  norm_reward: true
  clip_obs: 10.0

acceptance:
  # Fázis C elfogadási feltétel
  min_success_rate: 0.7     # 70%+ sikeres elhelyezés
  phase_reach_min: 0.85     # 85%+ reach fázis teljesítés
  phase_grasp_min: 0.75     # 75%+ grasp fázis teljesítés
