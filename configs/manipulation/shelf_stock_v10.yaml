# Shelf Stocking Manipulációs Policy — v10 konfiguráció
# Phase 030 F3 — lift plateau fix (2026-04-26)
#
# Változások v9-hez képest:
#   - Initial state: min 20cm kéz-doboz távolság reset-kor (kizárja 1-lépéses sikereket)
#   - lift_trigger_threshold: 0.01 → 0.005 (könnyebb LIFT fázisba lépni)
#   - w_lift: 3.0 → 5.0 (erősebb ösztönzés az emelésre)
#   - w_smooth: -0.001 → -0.01 (jittery mozdulatok büntetése, stabilabb fogás)
#   - total_timesteps: 5M → 2M (linear LR + korai konvergencia monitoring)

scene:
  xml_path: src/envs/assets/scene_manip_sandbox_v2.xml
  robot_pos: [0.0, 0.0, 0.793]
  stock_body: stock_1
  target_site: target_shelf
  right_hand_site: right_hand_site

env:
  max_episode_steps: 500
  goal_radius: 0.08
  grasp_dist_threshold: 0.10
  lift_height: 0.10
  lift_trigger_threshold: 0.005   # v9=0.01 → könnyebb LIFT fázisba lépni
  obs_dim: 24
  action_dim: 5    # 4 kar + 1 gripper

reward:
  w_reach:       1.0
  w_grasp:       2.0
  w_lift:        5.0    # v9=3.0 → erősebb emelési ösztönzés
  w_place:       2.0
  w_placed:     10.0
  w_joint_limit: -0.5
  w_smooth:      -0.01  # v9=-0.001 → jittery mozgás büntetése
  tanh_scale_reach: 5.0
  tanh_scale_place: 5.0
  lift_trigger_threshold: 0.005   # v9=0.01

ppo:
  n_envs: 8
  n_steps: 2048
  batch_size: 512
  n_epochs: 10
  learning_rate: 3.0e-4
  lr_schedule: linear   # 3e-4 → ~1e-5 a végére
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.03
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 2_000_000
  net_arch:
    pi: [256, 256, 128]
    vf: [256, 256, 128]

eval:
  n_eval_episodes: 10
  eval_freq: 50_000
  deterministic: true

checkpoint:
  save_freq: 500_000
  save_path: results/manip_checkpoints_v10/

logging:
  tensorboard_log: data/logs/manip_shelf_stock_v10/
  verbose: 1

vec_normalize:
  enabled: true
  norm_obs: true
  norm_reward: true
  clip_obs: 10.0

acceptance:
  min_success_rate: 0.7
  phase_reach_min: 0.85
  phase_grasp_min: 0.75
