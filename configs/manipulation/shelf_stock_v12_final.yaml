# Shelf Stocking Manipulációs Policy — v12-final konfiguráció
# Phase 030 F3a — utolsó PPO kísérlet (2026-04-29)
#
# Változások v11-hez képest:
#   - Phase-agnosztikus reward: minden komponens mindig aktív (nincs fázis-plateau)
#   - wrist DOF kihagyva (env módosítás nélkül futtatható)
#   - w_contact_force: folytonos contact force reward (nem bináris flag)
#   - n_envs: 8 (SubprocVecEnv — M2 párhuzamos)
#   - total_timesteps: 5M
#   - curriculum: stock x tartomány start 0.40-0.50, lineárisan bővül 0.35-0.55-re
#
# Elfogadási feltétel: ≥ 70% sikerességi arány 20 epizódon
# Ha nem teljesül: pivot → F3b (scripted_expert + ACT BC)

scene:
  xml_path: src/envs/assets/scene_manip_sandbox_v2.xml
  robot_pos: [0.0, 0.0, 0.793]
  stock_body: stock_1
  target_site: target_shelf
  right_hand_site: right_hand_site

env:
  max_episode_steps: 500
  goal_radius: 0.08
  grasp_dist_threshold: 0.10
  lift_height: 0.10
  obs_dim: 24          # változatlan (wrist DOF kihagyva — phase-agnostic reward az érdemi változás)
  action_dim: 5        # 4 kar + 1 gripper (wrist nélkül)

  # Curriculum: stock pozíció tartomány lineárisan bővül a training során
  curriculum:
    enabled: true
    stock_x_start: [0.40, 0.50]   # első 1M lépés
    stock_x_end:   [0.35, 0.55]   # 5M lépésnél
    stock_y: [-0.15, 0.15]        # fix

reward:
  # Phase-agnosztikus: minden reward komponens mindig aktív
  # Nincs fázis-váltás → nincs plateau → policy tanulhat párhuzamosan
  phase_agnostic: true

  w_reach:        1.0
  w_contact:      2.0    # folytonos contact force reward (volt: bináris grasp flag)
  w_lift:         5.0
  w_place:        2.0
  w_placed:      10.0
  w_joint_limit:  -0.5
  w_smooth:       -0.001   # LIMIT: max -0.001 (known_issues #17)

  tanh_scale_reach: 5.0
  tanh_scale_place: 5.0
  tanh_scale_contact: 10.0  # contact force normálás: reward = 1 - tanh(10 * max(0, thresh - force))

  # Lift: stock magassága az initial pozícióhoz képest
  lift_trigger_threshold: 0.005   # LIMIT: 0.005 (known_issues #14/#17)
  lift_scale: 10.0               # reward = tanh(lift_scale * stock_rise)

ppo:
  n_envs: 8            # SubprocVecEnv — M2 párhuzamos (volt: 8 v11-ben is)
  n_steps: 2048
  batch_size: 512
  n_epochs: 10
  learning_rate: 3.0e-4
  lr_schedule: linear
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.03       # LIMIT: 0.03 (known_issues #14)
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 5_000_000
  net_arch:
    pi: [256, 256, 128]
    vf: [256, 256, 128]

eval:
  n_eval_episodes: 20   # volt: 10 — elfogadási feltétel 20 ep-on mérve
  eval_freq: 50_000
  deterministic: true

checkpoint:
  save_freq: 500_000
  save_path: results/manip_checkpoints_v12/

logging:
  tensorboard_log: data/logs/manip_shelf_stock_v12/
  verbose: 1

vec_normalize:
  enabled: true
  norm_obs: true
  norm_reward: true
  clip_obs: 10.0

acceptance:
  # F3a küszöb: 50% (NEM 70%!) — pivot terv 2.1 szekció szerint
  # ≥ 50% → PPO-baseline rögzítve, befektetői pitch slide
  # < 50% → szintén jó: a BC pivot szükségessége még erősebb
  # (A 70% a teljes F3 elfogadási feltétel — F3d BC+PPO PPF után)
  min_success_rate: 0.50
  phase_reach_min: 0.85
  phase_grasp_min: 0.75

# --- F3a döntési fa (pivot terv 5. szekció alapján) ---
# v12 eredmény ≥ 50% → PPO-baseline dokumentálva, F3b indul párhuzamosan
# v12 eredmény < 50% → szintén: F3b indul, a BC pivot indoklása erősebb
# F3b → F3c (ACT BC) → F3d (BC+PPO, ha F3c < 80%) → F3e (UnifoLM-VLA-0, Kaggle T4)
# (tools/scripted_expert.py, tools/lerobot_export.py)
