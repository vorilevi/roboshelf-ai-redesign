# Shelf Stocking Manipulációs Policy — v7 konfiguráció
# Phase 030 F3 — PandaPickCube-szerű reward & obs design (2026-04-24)
#
# Változások v6-hoz képest:
#   - obs_dim: 18 → 24 (hand→stock és stock→target relatív vektorok + contact flag)
#   - reward: tanh alapú, bounded [0,1] — nem lineáris -w*dist
#   - grasp_dist_threshold: 0.06 → 0.10 (kéz site nem az ujjhegyen van)
#   - tanh_scale_reach/place: 5.0 (DeepMind PandaPickCube minta)
#   - target: x=0.45, y=0, z=0.97 (robot előtt, kar eléri — debug igazolta)
#   - DEFAULT_ARM_POS: [-1.0, 0.2, -0.2, 1.2] (debug optimum)

scene:
  xml_path: src/envs/assets/scene_manip_sandbox_v2.xml
  robot_pos: [0.0, 0.0, 0.793]
  stock_body: stock_1
  target_site: target_shelf
  right_hand_site: right_hand_site

env:
  max_episode_steps: 500
  goal_radius: 0.08
  grasp_dist_threshold: 0.10   # kéz→stock: site nem ujjhegy → 0.10m (volt 0.06)
  lift_height: 0.10            # alacsonyabb cél → könnyebb feladat (volt 0.15)
  obs_dim: 24                  # v7: 18+3+3 = 24 (relatív vektorok + contact flag)
  action_dim: 4

reward:
  # v7: tanh alapú shaping (DeepMind PandaPickCube minta)
  # 1 - tanh(scale * dist): bounded [0,1], erős gradiens közel, lapos távolabb
  w_reach:       1.0   # reach shaping súlya
  w_grasp:       2.0   # grasp bónusz (contact + közelségi)
  w_lift:        1.0   # lift shaping
  w_place:       2.0   # place shaping súlya
  w_placed:     10.0   # success bónusz
  w_joint_limit: -0.5
  w_smooth:      -0.001
  tanh_scale_reach: 5.0
  tanh_scale_place: 5.0

ppo:
  n_envs: 8
  n_steps: 2048
  batch_size: 512
  n_epochs: 10
  learning_rate: 3.0e-4
  lr_schedule: linear
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 5_000_000
  net_arch:
    pi: [256, 256, 128]
    vf: [256, 256, 128]

eval:
  n_eval_episodes: 10
  eval_freq: 50_000
  deterministic: true

checkpoint:
  save_freq: 500_000
  save_path: results/manip_checkpoints_v7/

logging:
  tensorboard_log: data/logs/manip_shelf_stock_v7/
  verbose: 1

vec_normalize:
  enabled: true
  norm_obs: true
  norm_reward: true
  clip_obs: 10.0

acceptance:
  min_success_rate: 0.7
  phase_reach_min: 0.85
  phase_grasp_min: 0.75
