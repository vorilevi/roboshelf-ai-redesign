# Hierarchikus Retail Nav Policy — v1 konfiguráció
# Fázis B: retail navigáció a motion.pt locomotion prior felett
#
# Architektúra:
#   High-level: NavPolicy (PPO) → LocomotionCommand(v_forward, yaw_rate)
#   Low-level:  UnitreeRLGymAdapter (motion.pt LSTM) → torque[12]
#
# Az eredeti terv curriculum-a:
#   Szint 1: Állás → egyenes előre (0.5m)
#   Szint 2: Egyenes navigáció (1.5m)
#   Szint 3: Kanyarodás (90°)
#   Szint 4: Teljes pálya (3.3m, akadályokkal)

locomotion:
  adapter: UnitreeRLGymAdapter
  model_path: unitree_rl_gym/deploy/pre_train/g1/motion.pt
  # Ha saját loco policy kell (PPF fine-tune után):
  # model_path: roboshelf-results/loco/ppf_v1/best_model.zip
  # adapter: LocomotionPolicyAdapter

env:
  scene_xml: src/envs/assets/roboshelf_retail_store.xml
  max_episode_steps: 500
  goal_radius: 0.5           # m — ennyi távolságon belül "célba ért"
  n_sim_steps_per_nav: 100   # hány 500Hz sim lépés = 1 nav lépés (5 Hz nav)
                             # = NAV_DECIMATION a kódban
  # Observation space:
  #   robot_xy (2) + goal_rel_polar (2: dist, angle) + torso_heading (1)
  #   + torso_lin_vel (2) + foot_contact (2) = 9 dim
  obs_dim: 9
  # Action space: [v_forward, yaw_rate] normalizálva [-1, 1]
  action_dim: 2
  v_forward_range: [0.0, 1.0]   # m/s
  yaw_rate_range: [-0.8, 0.8]   # rad/s

curriculum:
  # A 4 curriculum szint — sorban feloldódnak ahogy az acceptance teljesül
  levels:
    - id: 1
      name: "egyenes_rovid"
      description: "Egyenes előre haladás, 1.5m (start random ±0.3m offset)"
      goal_fixed: [0.0, 1.5]    # fix célpont [x, y] — elég messze a start offsets-tól
      obstacles: false
      acceptance:
        success_rate: 0.8       # 80%-ban érje el a célt
        min_ep_steps: 10        # legalább 10 lépés (ne zuhanjon azonnal)

    - id: 2
      name: "egyenes_hosszu"
      description: "Egyenes navigáció, 2.5m"
      goal_fixed: [0.0, 2.5]
      obstacles: false
      acceptance:
        success_rate: 0.7

    - id: 3
      name: "kanyar"
      description: "Kanyarodás + navigáció, 2.0m"
      goal_range:
        x: [-1.0, 1.0]
        y: [1.5, 2.5]
      obstacles: false
      acceptance:
        success_rate: 0.6

    - id: 4
      name: "teljes_palya"
      description: "Teljes 3.3m pálya, akadályokkal"
      goal_fixed: [0.0, 3.8]    # raktár pozíció (legacy nav env alapján)
      obstacles: true
      acceptance:
        success_rate: 0.5

reward:
  w_goal_approach: 5.0      # távolság csökkentés per lépés
  w_goal_reached: 100.0     # célba érés bonus
  w_collision: -20.0        # ütközés büntetés
  w_loco_fail: -10.0        # locomotion összeomlás büntetés
  w_orientation: -0.5       # céltól való elfordulás büntetés
  w_time: -0.01             # időbüntetés (gyorsabb megoldást ösztönöz)

ppf:
  # Preservative Fine-Tune — KL büntetés a locomotion policy megőrzéséhez
  # Ha a nav tanítás közben a loco "elromlik", ez visszahúzza
  enabled: false             # Fázis B v1-ben kikapcsolt — v2-ben bekapcsoljuk ha kell
  kl_coef: 0.1
  reference_model: ~/unitree_rl_gym/deploy/pre_train/g1/motion.pt

ppo:
  # RL Zoo / Humanoid-v4 best-practice alapján hangolva hierarchikus nav-ra:
  #   - n_steps*n_envs = rollout buffer méret; 2048*4=8192 (RL Zoo Humanoid: 2048*1)
  #   - batch_size: rollout / 16 → jó trade-off sebesség vs. gradiens minőség
  #   - n_epochs: 10 standard, nav-nál nem emeljük (overfitting rizikó)
  #   - lr: 3e-4 → lineáris decay a LR schedule-lel (lr_schedule: linear)
  #   - gamma: 0.999 (hosszabb horizon — nav epizódok hosszabbak mint loco)
  #   - gae_lambda: 0.95 standard
  #   - clip_range: 0.2 standard; nav-nál nem emeljük
  #   - ent_coef: 0.01 → v1 0.005-ről emelve (jobb exploráció nav-nál)
  #   - vf_coef: 0.5 standard
  #   - max_grad_norm: 0.5 standard
  n_envs: 4                 # nav env nehezebb → kevesebb párhuzamos env
  n_steps: 2048             # v1: 1024 → 2048 (RL Zoo Humanoid alap)
  batch_size: 256           # v1: 128 → 256 (n_steps*n_envs/32)
  n_epochs: 10
  learning_rate: 3.0e-4     # v1: 1e-4 → 3e-4, lineáris decay
  lr_schedule: linear       # tanítás végén lr→0 (RL Zoo ajánlás)
  gamma: 0.999              # v1: 0.99 → 0.999 (nav hosszabb horizon)
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01            # v1: 0.005 → 0.01 (jobb nav exploráció)
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 3_000_000

eval:
  n_eval_episodes: 10
  eval_freq: 25_000
  deterministic: true

checkpoint:
  save_freq: 50_000
  save_path: roboshelf-results/nav/hier_v1/

logging:
  tensorboard_log: data/logs/nav_hier_v1/
  verbose: 1

vec_normalize:
  enabled: true
  norm_obs: true
  norm_reward: true
  clip_obs: 10.0
  # load_path: roboshelf-results/nav/hier_v1/vec_normalize.pkl  # fine-tune esetén

acceptance:
  # Fázis B végső elfogadási feltétele
  min_success_rate: 0.5     # 50%+ célpont elérés random startból
  loco_collapse_max: 0.1    # max 10% epizódban omoljon össze a locomotion
