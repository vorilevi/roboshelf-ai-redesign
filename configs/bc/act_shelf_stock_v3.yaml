# ACT BC Config v3 — Plain BC, VAE DISABLED
# Phase 030 F3d — 2026-05-01
#
# v2 post-mortem:
#   val_mse=0.0095 (tréning jól megy) DE KL=443 → CVAE posterior messze N(0,1)-től.
#   Inference-kor z=0 → a decoder a TRÉNING eloszlástól idegen z-t kap → rossz SR.
#   Megoldás: VAE teljesen kikapcsolva → z=0 mindig (tréning + inference azonos).
#
# v3 változtatások vs v2:
#   - vae.enabled: false  → z=0 tréningben is, nincs train/inference gap
#   - kl_weight: irreleváns (VAE ki van kapcsolva)
#   - chunk_size: 10 (marad)
#   - num_epochs: 500 (több epoch — egyszerűbb loss, gyorsabb konvergencia)
#   - lr: 3e-4 (marad)
#   - Egyéb: azonos a v2-vel
#
# Elvárt viselkedés:
#   - loss = csak MSE (KL = 0 mindig)
#   - val_mse várhatóan 0.005-0.02 körül (tréning azonos az inferenc-cel)
#   - SR várhatóan magasabb mint v2 (nincs train/inference gap)

# --- Dataset ---
dataset:
  path: data/lerobot/scripted_v1
  obs_dim:    24
  action_dim: 5
  fps:        20
  train_split: 0.9
  seed: 42

# --- Model ---
model:
  type: ACT

  obs_encoder:
    type: mlp
    hidden_dims: [64]
    activation: relu
    layer_norm: true

  transformer:
    d_model: 64
    nhead: 4
    num_encoder_layers: 2
    num_decoder_layers: 3
    dim_feedforward: 256
    dropout: 0.05          # kissé kisebb dropout (kevesebb regularizáció, mert nincs VAE)
    activation: relu
    normalize_before: true

  chunk_size: 10
  action_dim: 5

  vae:
    enabled: false         # ← KULCS VÁLTOZTATÁS: VAE ki, z=0 mindig
    latent_dim: 16         # (irreleváns, de a kód kell)
    kl_weight: 0.0         # KL term = 0

# --- Training ---
training:
  device: mps
  dtype: float32

  batch_size: 16
  num_epochs: 500
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  lr_schedule: cosine
  warmup_steps: 200
  grad_clip: 1.0

  save_every_n_epochs: 50
  checkpoint_dir: results/bc_checkpoints_act_v3/
  keep_last_n: 3

  tensorboard_log: data/logs/bc_act_v3/
  log_every_n_steps: 50

# --- Evaluation ---
eval:
  n_eval_episodes: 50
  eval_every_n_epochs: 50
  deterministic: true
  env:
    xml_path: src/envs/assets/scene_manip_sandbox_v2.xml
    max_episode_steps: 300
    goal_radius: 0.08

# --- Normalization ---
normalization:
  obs:    zscore
  action: minmax

# --- Elfogadás ---
acceptance:
  min_success_rate: 0.40

# --- Futtatás ---
# python3 tools/train_act.py \
#   --config configs/bc/act_shelf_stock_v3.yaml
#
# Várható: loss = pure MSE (nincs KL), val ~0.005-0.02, ~20-30 perc M2-n
# eval:
# python3 tools/eval_act.py \
#   --ckpt    results/bc_checkpoints_act_v3 \
#   --stats   data/lerobot/scripted_v1/meta/stats.json \
#   --n-eval  50 \
#   --exec-horizon 5
